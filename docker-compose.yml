# 199xVM — Docker Compose (JTBD: VM only / Compiler only / Web Playground)
# - "build" profile: rust, java, node — used only for `docker-compose run <svc> make <target>`
# - no profile: web — started by `docker-compose up` (serve dist or project root)

services:
  web:
    build:
      context: .
      dockerfile: docker/Dockerfile.node
    command: npx serve . -p 3000
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - node_modules:/app/node_modules
    working_dir: /app

  rust:
    profiles:
      - build
    build:
      context: .
      dockerfile: docker/Dockerfile.rust
    volumes:
      - .:/app
    working_dir: /app
    command: sleep infinity

  java:
    profiles:
      - build
    build:
      context: .
      dockerfile: docker/Dockerfile.java
    volumes:
      - .:/app
    working_dir: /app
    command: sleep infinity

  node:
    profiles:
      - build
    build:
      context: .
      dockerfile: docker/Dockerfile.node
    volumes:
      - .:/app
      - node_modules:/app/node_modules
    working_dir: /app
    command: sleep infinity

volumes:
  node_modules:
